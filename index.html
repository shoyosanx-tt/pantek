<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Patcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px; max-width: 520px; width: 100%; margin: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    p { color: #8b949e; font-size: 0.875rem; margin-bottom: 20px; }
    label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 6px; }
    input, button { width: 100%; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; }
    input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; margin-bottom: 16px; }
    input:focus { border-color: #58a6ff; outline: none; }
    button { background: #238636; border: none; color: #fff; font-weight: 600; cursor: pointer; }
    button:hover { background: #2ea043; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.875rem; display: none; }
    .status.info { display: block; background: #0d419d; border: 1px solid #1f6feb; }
    .status.success { display: block; background: #1a3a1a; border: 1px solid #3fb950; }
    .status.error { display: block; background: #3a1a1a; border: 1px solid #f85149; }
    a { color: #58a6ff; }
    .small { font-size: 0.8rem; color: #8b949e; margin-top: 12px; }
    .step { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 0.85rem; }
    .step code { background: #21262d; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Video Patcher</h1>
    <p>Upload video ke <a href="https://gofile.io" target="_blank">gofile.io</a>, paste link-nya di sini.</p>

    <div class="step">
      <strong>Langkah:</strong><br>
      1. Upload video ke <a href="https://gofile.io" target="_blank">gofile.io</a><br>
      2. Klik kanan file → <strong>Copy link</strong><br>
      3. Paste link di bawah → klik Process
    </div>

    <label for="gofileUrl">Gofile Link</label>
    <input type="url" id="gofileUrl" placeholder="https://gofile.io/d/xxxxxx" required>

    <label for="pat">GitHub Token (PAT)</label>
    <input type="password" id="pat" placeholder="github_pat_xxx" required>
    <p class="small">Buat PAT di Settings → Developer settings → Personal access tokens → Tokens (classic) dengan scope <strong>repo</strong>.</p>

    <button id="submitBtn" onclick="triggerWorkflow()">Process Video</button>

    <div id="status" class="status"></div>

    <div id="resultArea" style="display:none; margin-top: 16px; padding: 12px; background: #0d1117; border: 1px solid #21262d; border-radius: 8px;">
      <strong>Hasil patch:</strong><br>
      <a id="resultLink" href="#" target="_blank"></a>
    </div>
  </div>

  <script>
    const REPO_OWNER = 'shoyosan-tt';
    const REPO_NAME = 'pantek';

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    async function triggerWorkflow() {
      const url = document.getElementById('gofileUrl').value.trim();
      const token = document.getElementById('pat').value.trim();
      if (!url || !token) { setStatus('Isi semua field.', 'error'); return; }
      if (!url.includes('gofile.io')) { setStatus('Link harus dari gofile.io', 'error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      setStatus('Mengirim ke GitHub...', 'info');

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            event_type: 'patch-video',
            client_payload: { gofile_url: url }
          }),
        });

        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }

        setStatus('Workflow berjalan! Cek tab Actions untuk progress. Hasil akan muncul setelah selesai.', 'success');
        document.getElementById('resultArea').style.display = 'none';
      } catch (e) {
        setStatus('Gagal: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    // Load saved PAT from localStorage
    const savedPat = localStorage.getItem('gh_pat');
    if (savedPat) document.getElementById('pat').value = savedPat;
    document.getElementById('pat').addEventListener('change', function() {
      localStorage.setItem('gh_pat', this.value);
    });
  </script>
</body>
</html>
