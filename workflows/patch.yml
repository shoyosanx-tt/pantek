name: Patch Video

on:
  repository_dispatch:
    types: [patch-video]
  workflow_dispatch:
    inputs:
      gofile_url:
        description: 'Gofile download link'
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Extract Gofile file ID
        id: parse
        shell: bash
        run: |
          URL="${{ github.event.client_payload.gofile_url || inputs.gofile_url }}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "file_id=$(echo $URL | grep -oP '(?<=file/)[a-zA-Z0-9]+')" >> $GITHUB_OUTPUT

      - name: Download video from Gofile
        run: |
          curl -L "https://gofile.io/d/${{ steps.parse.outputs.file_id }}" -o input.mp4

      - name: Run patcher
        run: python patcher.py input.mp4 output.mp4

      - name: Upload patched video to Gofile
        id: upload
        shell: bash
        run: |
          response=$(curl -s -F "file=@output.mp4" "https://store1.gofile.io/uploadFile")
          echo "resp=$response"
          link=$(echo "$response" | python -c "import sys,json; print(json.load(sys.stdin)['data']['downloadPage'])")
          echo "result_link=$link" >> $GITHUB_OUTPUT

      - name: Save result link
        shell: bash
        run: |
          echo '${{ steps.upload.outputs.result_link }}' > result.txt
          cat result.txt
